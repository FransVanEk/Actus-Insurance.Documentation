<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="Trebuchet MS, Arial, sans-serif">
  <defs>
    <!-- Gradient for the dark background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2836"/>
      <stop offset="100%" style="stop-color:#243344"/>
    </linearGradient>
    <!-- Gold accent gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4891A"/>
      <stop offset="100%" style="stop-color:#e6a040"/>
    </linearGradient>
    <!-- Highway gradient (darker) -->
    <linearGradient id="hwGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a2530"/>
      <stop offset="100%" style="stop-color:#2a3a4a"/>
    </linearGradient>
    <!-- Glow filter for accent elements -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Car shape (simplified top-down race car) -->
    <g id="car-gold">
      <rect x="-8" y="-14" width="16" height="28" rx="5" fill="#D4891A" stroke="#e6a040" stroke-width="1"/>
      <rect x="-5" y="-10" width="10" height="6" rx="2" fill="#e6a040" opacity="0.6"/>
      <rect x="-5" y="4" width="10" height="4" rx="1" fill="#e6a040" opacity="0.4"/>
    </g>
    <g id="car-blue">
      <rect x="-8" y="-14" width="16" height="28" rx="5" fill="#4a8ab5" stroke="#6ab0d8" stroke-width="1"/>
      <rect x="-5" y="-10" width="10" height="6" rx="2" fill="#6ab0d8" opacity="0.6"/>
      <rect x="-5" y="4" width="10" height="4" rx="1" fill="#6ab0d8" opacity="0.4"/>
    </g>
    <g id="car-teal">
      <rect x="-8" y="-14" width="16" height="28" rx="5" fill="#3a8a7a" stroke="#5ab89a" stroke-width="1"/>
      <rect x="-5" y="-10" width="10" height="6" rx="2" fill="#5ab89a" opacity="0.6"/>
      <rect x="-5" y="4" width="10" height="4" rx="1" fill="#5ab89a" opacity="0.4"/>
    </g>
    <!-- Arrow marker -->
    <marker id="arrowGold" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#D4891A"/>
    </marker>
    <marker id="arrowWhite" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#8FAAB8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bgGrad)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#goldGrad)"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" fill="#FFFFFF" font-size="26" font-weight="bold" letter-spacing="2">THE CAR FACTORY — FROM SINGLE TRACK TO HIGHWAY</text>
  <text x="600" y="72" text-anchor="middle" fill="#8FAAB8" font-size="13" letter-spacing="1">HOW GPU ACCELERATION WORKS FOR FINANCIAL CONTRACT EVALUATION</text>

  <!-- ========================================= -->
  <!-- SECTION 1: Single Track (left) -->
  <!-- ========================================= -->
  <g transform="translate(0, 0)">
    <!-- Section label -->
    <rect x="30" y="95" width="180" height="28" rx="4" fill="#243344" stroke="#D4891A" stroke-width="1.5"/>
    <text x="120" y="114" text-anchor="middle" fill="#D4891A" font-size="12" font-weight="bold">SINGLE TRACK</text>

    <!-- Single lane road -->
    <rect x="65" y="135" width="110" height="320" rx="6" fill="#1a2530" stroke="#3a4f60" stroke-width="1"/>
    <!-- Lane dashes -->
    <line x1="120" y1="145" x2="120" y2="165" stroke="#3a4f60" stroke-width="1.5" stroke-dasharray="4,8"/>
    <line x1="120" y1="175" x2="120" y2="195" stroke="#3a4f60" stroke-width="1.5" stroke-dasharray="4,8"/>
    <line x1="120" y1="205" x2="120" y2="225" stroke="#3a4f60" stroke-width="1.5" stroke-dasharray="4,8"/>
    <line x1="120" y1="235" x2="120" y2="255" stroke="#3a4f60" stroke-width="1.5" stroke-dasharray="4,8"/>
    <line x1="120" y1="265" x2="120" y2="285" stroke="#3a4f60" stroke-width="1.5" stroke-dasharray="4,8"/>
    <line x1="120" y1="295" x2="120" y2="315" stroke="#3a4f60" stroke-width="1.5" stroke-dasharray="4,8"/>
    <line x1="120" y1="325" x2="120" y2="345" stroke="#3a4f60" stroke-width="1.5" stroke-dasharray="4,8"/>
    <line x1="120" y1="355" x2="120" y2="375" stroke="#3a4f60" stroke-width="1.5" stroke-dasharray="4,8"/>
    <line x1="120" y1="385" x2="120" y2="405" stroke="#3a4f60" stroke-width="1.5" stroke-dasharray="4,8"/>
    <line x1="120" y1="415" x2="120" y2="435" stroke="#3a4f60" stroke-width="1.5" stroke-dasharray="4,8"/>

    <!-- One car driving -->
    <use href="#car-gold" x="120" y="200"/>

    <!-- Waiting cars (parked, dimmed) -->
    <g opacity="0.3">
      <use href="#car-gold" x="120" y="280"/>
      <use href="#car-gold" x="120" y="330"/>
      <use href="#car-gold" x="120" y="380"/>
      <use href="#car-gold" x="120" y="430"/>
    </g>

    <!-- Label -->
    <text x="120" y="478" text-anchor="middle" fill="#8FAAB8" font-size="11">1 contract at a time</text>
    <text x="120" y="494" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">Reference Engine</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="195" y1="300" x2="230" y2="300" stroke="#D4891A" stroke-width="2" marker-end="url(#arrowGold)"/>

  <!-- ========================================= -->
  <!-- SECTION 2: 8-Track CPU (middle-left) -->
  <!-- ========================================= -->
  <g transform="translate(0, 0)">
    <!-- Section label -->
    <rect x="240" y="95" width="180" height="28" rx="4" fill="#243344" stroke="#D4891A" stroke-width="1.5"/>
    <text x="330" y="114" text-anchor="middle" fill="#D4891A" font-size="12" font-weight="bold">8-TRACK FACILITY</text>

    <!-- 8 narrow lanes -->
    <rect x="255" y="135" width="150" height="320" rx="6" fill="#1a2530" stroke="#3a4f60" stroke-width="1"/>

    <!-- Lane separators and cars -->
    <g>
      <!-- 8 lanes, each ~16px wide, starting at x=262 -->
      <use href="#car-gold" x="275" y="180"/>
      <use href="#car-blue" x="293" y="210"/>
      <use href="#car-teal" x="311" y="165"/>
      <use href="#car-gold" x="329" y="240"/>
      <use href="#car-blue" x="347" y="195"/>
      <use href="#car-teal" x="365" y="225"/>
      <use href="#car-gold" x="383" y="175"/>
      <use href="#car-blue" x="392" y="250"/>

      <!-- Lane lines -->
      <line x1="284" y1="140" x2="284" y2="450" stroke="#3a4f60" stroke-width="0.5" stroke-dasharray="3,6"/>
      <line x1="302" y1="140" x2="302" y2="450" stroke="#3a4f60" stroke-width="0.5" stroke-dasharray="3,6"/>
      <line x1="320" y1="140" x2="320" y2="450" stroke="#3a4f60" stroke-width="0.5" stroke-dasharray="3,6"/>
      <line x1="338" y1="140" x2="338" y2="450" stroke="#3a4f60" stroke-width="0.5" stroke-dasharray="3,6"/>
      <line x1="356" y1="140" x2="356" y2="450" stroke="#3a4f60" stroke-width="0.5" stroke-dasharray="3,6"/>
      <line x1="374" y1="140" x2="374" y2="450" stroke="#3a4f60" stroke-width="0.5" stroke-dasharray="3,6"/>
      <line x1="392" y1="140" x2="392" y2="450" stroke="#3a4f60" stroke-width="0.5" stroke-dasharray="3,6"/>
    </g>

    <!-- Label -->
    <text x="330" y="478" text-anchor="middle" fill="#8FAAB8" font-size="11">8 contracts in parallel</text>
    <text x="330" y="494" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">CPU Engine</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="418" y1="300" x2="453" y2="300" stroke="#D4891A" stroke-width="2" marker-end="url(#arrowGold)"/>

  <!-- ========================================= -->
  <!-- SECTION 3: GPU Highway (centre-right) -->
  <!-- ========================================= -->
  <g transform="translate(0, 0)">
    <!-- Section label -->
    <rect x="460" y="95" width="410" height="28" rx="4" fill="#243344" stroke="#D4891A" stroke-width="1.5"/>
    <text x="665" y="114" text-anchor="middle" fill="#D4891A" font-size="12" font-weight="bold">GPU HIGHWAY — 1,000+ LANES</text>

    <!-- Off-ramp exit strip (rendered before highway so track appears on top) -->
    <rect x="465" y="427" width="400" height="28" rx="4" fill="#243344" stroke="#D4891A" stroke-width="1"/>
    <text x="665" y="446" text-anchor="middle" fill="#D4891A" font-size="12" font-weight="bold">OFF-RAMP</text>

    <!-- Wide highway -->
    <rect x="465" y="163" width="400" height="264" rx="8" fill="#1a2530" stroke="#3a4f60" stroke-width="1.5"/>

    <!-- Many lane lines -->
    <g stroke="#3a4f60" stroke-width="0.3" stroke-dasharray="2,5">
      <line x1="480" y1="168" x2="480" y2="450"/>
      <line x1="492" y1="168" x2="492" y2="450"/>
      <line x1="504" y1="168" x2="504" y2="450"/>
      <line x1="516" y1="168" x2="516" y2="450"/>
      <line x1="528" y1="168" x2="528" y2="450"/>
      <line x1="540" y1="168" x2="540" y2="450"/>
      <line x1="552" y1="168" x2="552" y2="450"/>
      <line x1="564" y1="168" x2="564" y2="450"/>
      <line x1="576" y1="168" x2="576" y2="450"/>
      <line x1="588" y1="168" x2="588" y2="450"/>
      <line x1="600" y1="168" x2="600" y2="450"/>
      <line x1="612" y1="168" x2="612" y2="450"/>
      <line x1="624" y1="168" x2="624" y2="450"/>
      <line x1="636" y1="168" x2="636" y2="450"/>
      <line x1="648" y1="168" x2="648" y2="450"/>
      <line x1="660" y1="168" x2="660" y2="450"/>
      <line x1="672" y1="168" x2="672" y2="450"/>
      <line x1="684" y1="168" x2="684" y2="450"/>
      <line x1="696" y1="168" x2="696" y2="450"/>
      <line x1="708" y1="168" x2="708" y2="450"/>
      <line x1="720" y1="168" x2="720" y2="450"/>
      <line x1="732" y1="168" x2="732" y2="450"/>
      <line x1="744" y1="168" x2="744" y2="450"/>
      <line x1="756" y1="168" x2="756" y2="450"/>
      <line x1="768" y1="168" x2="768" y2="450"/>
      <line x1="780" y1="168" x2="780" y2="450"/>
      <line x1="792" y1="168" x2="792" y2="450"/>
      <line x1="804" y1="168" x2="804" y2="450"/>
      <line x1="816" y1="168" x2="816" y2="450"/>
      <line x1="828" y1="168" x2="828" y2="450"/>
      <line x1="840" y1="168" x2="840" y2="450"/>
      <line x1="852" y1="168" x2="852" y2="450"/>
    </g>

    <!-- Many cars driving at different positions (staggered for motion effect) -->
    <g>
      <use href="#car-gold" transform="translate(486,203) scale(0.5)"/>
      <use href="#car-blue" transform="translate(498,238) scale(0.5)"/>
      <use href="#car-teal" transform="translate(510,188) scale(0.5)"/>
      <use href="#car-gold" transform="translate(522,258) scale(0.5)"/>
      <use href="#car-blue" transform="translate(534,213) scale(0.5)"/>
      <use href="#car-teal" transform="translate(546,278) scale(0.5)"/>
      <use href="#car-gold" transform="translate(558,198) scale(0.5)"/>
      <use href="#car-blue" transform="translate(570,248) scale(0.5)"/>
      <use href="#car-teal" transform="translate(582,223) scale(0.5)"/>
      <use href="#car-gold" transform="translate(594,268) scale(0.5)"/>
      <use href="#car-blue" transform="translate(606,193) scale(0.5)"/>
      <use href="#car-teal" transform="translate(618,233) scale(0.5)"/>
      <use href="#car-gold" transform="translate(630,273) scale(0.5)"/>
      <use href="#car-blue" transform="translate(642,208) scale(0.5)"/>
      <use href="#car-teal" transform="translate(654,253) scale(0.5)"/>
      <use href="#car-gold" transform="translate(666,218) scale(0.5)"/>
      <use href="#car-blue" transform="translate(678,263) scale(0.5)"/>
      <use href="#car-teal" transform="translate(690,198) scale(0.5)"/>
      <use href="#car-gold" transform="translate(702,243) scale(0.5)"/>
      <use href="#car-blue" transform="translate(714,278) scale(0.5)"/>
      <use href="#car-teal" transform="translate(726,203) scale(0.5)"/>
      <use href="#car-gold" transform="translate(738,228) scale(0.5)"/>
      <use href="#car-blue" transform="translate(750,268) scale(0.5)"/>
      <use href="#car-teal" transform="translate(762,213) scale(0.5)"/>
      <use href="#car-gold" transform="translate(774,253) scale(0.5)"/>
      <use href="#car-blue" transform="translate(786,188) scale(0.5)"/>
      <use href="#car-teal" transform="translate(798,238) scale(0.5)"/>
      <use href="#car-gold" transform="translate(810,273) scale(0.5)"/>
      <use href="#car-blue" transform="translate(822,208) scale(0.5)"/>
      <use href="#car-teal" transform="translate(834,258) scale(0.5)"/>
      <use href="#car-gold" transform="translate(846,223) scale(0.5)"/>
    </g>

    <!-- On-ramp entry strip (rendered on top) -->
    <rect x="465" y="135" width="400" height="28" rx="4" fill="#243344" stroke="#D4891A" stroke-width="1"/>
    <text x="665" y="154" text-anchor="middle" fill="#D4891A" font-size="12" font-weight="bold">ON-RAMP</text>

    <!-- Arrow and cars entering on-ramp (small→large left to right) -->
    <text x="987" y="127" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">All contracts</text>
    <line x1="1065" y1="149" x2="868" y2="149" stroke="#D4891A" stroke-width="1.5" marker-end="url(#arrowGold)"/>
    <use href="#car-blue" transform="translate(910,149) scale(0.45)"/>
    <use href="#car-gold" transform="translate(942,149) scale(0.65)"/>
    <use href="#car-teal" transform="translate(978,149) scale(0.85)"/>
    <use href="#car-blue" transform="translate(1022,149) scale(1.1)"/>
    <text x="952" y="172" text-anchor="middle" fill="#8FAAB8" font-size="10" font-style="italic">optimize size</text>

    <!-- Looping arrow (off-ramp centre → around right → on-ramp bottom) -->
    <path d="M 865 441 Q 887 441 887 302 Q 887 163 865 163" fill="none" stroke="#D4891A" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGold)"/>
    <text x="900" y="302" text-anchor="middle" fill="#D4891A" font-size="9" font-style="italic" transform="rotate(90 900 302)">loop: next scenario</text>

    <!-- Label -->
    <text x="665" y="506" text-anchor="middle" fill="#8FAAB8" font-size="11">1,000+ contracts simultaneously</text>
    <text x="665" y="522" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">GPU Engine</text>
  </g>

  <!-- ========================================= -->
  <!-- SECTION 4: On-Ramp &amp; Off-Ramp (right) -->
  <!-- ========================================= -->
  <g transform="translate(0, 0)">
    <!-- Off-Ramp / Sinks -->
    <rect x="895" y="366" width="130" height="28" rx="4" fill="#243344" stroke="#D4891A" stroke-width="1.5"/>
    <text x="960" y="385" text-anchor="middle" fill="#D4891A" font-size="12" font-weight="bold">SINKS</text>

    <!-- Sink box -->
    <rect x="905" y="406" width="110" height="70" rx="6" fill="#243344" stroke="#D4891A" stroke-width="1"/>

    <!-- Many data points going in -->
    <g fill="#4a8ab5" opacity="0.4">
      <circle cx="915" cy="416" r="2"/>
      <circle cx="922" cy="419" r="2"/>
      <circle cx="929" cy="414" r="2"/>
      <circle cx="936" cy="421" r="2"/>
      <circle cx="943" cy="416" r="2"/>
      <circle cx="950" cy="419" r="2"/>
      <circle cx="957" cy="415" r="2"/>
      <circle cx="964" cy="420" r="2"/>
      <circle cx="971" cy="416" r="2"/>
      <circle cx="978" cy="419" r="2"/>
      <circle cx="985" cy="414" r="2"/>
      <circle cx="992" cy="421" r="2"/>
      <circle cx="999" cy="416" r="2"/>
      <circle cx="1006" cy="419" r="2"/>
    </g>

    <!-- Aggregation symbol -->
    <text x="960" y="446" text-anchor="middle" fill="#8FAAB8" font-size="10">avg | spread | risk</text>

    <!-- Few summary points coming out -->
    <g fill="#D4891A" filter="url(#glow)">
      <circle cx="935" cy="466" r="3.5"/>
      <circle cx="950" cy="466" r="3.5"/>
      <circle cx="965" cy="466" r="3.5"/>
      <circle cx="980" cy="466" r="3.5"/>
    </g>

    <!-- Arrow from off-ramp centre to sink -->
    <path d="M 865 441 L 905 441" stroke="#8FAAB8" stroke-width="1.5" fill="none" marker-end="url(#arrowWhite)"/>

    <!-- Arrow down to report -->
    <line x1="960" y1="476" x2="960" y2="491" stroke="#D4891A" stroke-width="1.5" marker-end="url(#arrowGold)"/>

    <!-- Report icon -->
    <rect x="930" y="491" width="60" height="40" rx="4" fill="#243344" stroke="#8FAAB8" stroke-width="1"/>
    <line x1="940" y1="503" x2="980" y2="503" stroke="#8FAAB8" stroke-width="0.8"/>
    <line x1="940" y1="511" x2="975" y2="511" stroke="#8FAAB8" stroke-width="0.8"/>
    <line x1="940" y1="519" x2="970" y2="519" stroke="#8FAAB8" stroke-width="0.8"/>
    <text x="960" y="546" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">Report</text>

  </g>

  <!-- ========================================= -->
  <!-- BOTTOM: Mapping legend -->
  <!-- ========================================= -->

  <!-- Divider line -->
  <line x1="30" y1="575" x2="1170" y2="575" stroke="#D4891A" stroke-width="1" opacity="0.4"/>

  <!-- Legend title -->
  <text x="600" y="600" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="bold" letter-spacing="1">FROM CARS TO CONTRACTS</text>

  <!-- Legend items (3 columns) -->
  <g fill="#8FAAB8" font-size="11">
    <!-- Column 1 -->
    <use href="#car-gold" x="60" y="632"/>
    <text x="80" y="637" fill="#FFFFFF">= 1 Financial Contract</text>
    <rect x="45" y="654" width="18" height="12" rx="2" fill="#1a2530" stroke="#3a4f60" stroke-width="0.5"/>
    <text x="80" y="665" fill="#FFFFFF">= Test Track / Highway Lane</text>

    <!-- Column 2 -->
    <text x="310" y="637" fill="#D4891A" font-size="18">&#9729;</text>
    <text x="330" y="637" fill="#FFFFFF">Road Conditions = Market Scenarios</text>
    <circle cx="318" cy="662" r="5" fill="#D4891A" filter="url(#glow)"/>
    <text x="330" y="665" fill="#FFFFFF">Sinks = GPU-side aggregation</text>

    <!-- Column 3 -->
    <text x="650" y="637" fill="#FFFFFF">1 Track = Java Reference (sequential)</text>
    <text x="650" y="665" fill="#FFFFFF">8 Tracks = CPU Engine (8 cores parallel)</text>
    <text x="650" y="693" fill="#FFFFFF">1,000 Lanes = GPU Engine (massively parallel)</text>
  </g>

  <!-- Decorative bottom accent -->
  <rect x="0" y="716" width="1200" height="4" fill="url(#goldGrad)"/>
</svg>